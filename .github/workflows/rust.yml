name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Check formatting
      run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Clippy
      # --exclude solve-gen: the AGPL generator builds the whole solver —
      # too heavy for CI, and it never ships. preflop-gen is light and gated.
      run: cargo clippy --workspace --exclude solve-gen --all-targets --all-features -- -D warnings

  doc:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Build docs
      env:
        RUSTDOCFLAGS: -D warnings
      run: cargo doc --workspace --exclude solve-gen --no-deps --all-features

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v7
    - name: Test (all features)
      run: cargo test --workspace --exclude solve-gen --all-features --verbose
