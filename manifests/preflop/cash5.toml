# 6-max cash, 5bb effective, chip-EV. Pure push/fold: open-jam or fold
# (design 07).
id = "cash5"
label = "6-max cash, 5bb"
seats = ["UTG", "HJ", "CO", "BTN", "SB", "BB"]
stack_bb = 5.0
sb = 0.5
bb = 1.0
ante_bb = 0.0
open_to_bb = [2.0, 2.5, 3.0]
threebet_mult = [2.0, 3.0, 4.0] # × the open-to amount, heads-up vs the open
squeeze_mult = [4.0]            # × the open-to amount once the open has a caller
fourbet_mult = [2.3]            # × the 3-bet-to amount; larger 4-bets collapse into the jam
fivebet_mult = [2.2]            # × the 4-bet-to amount; a 6-bet is jam-only
jam_from_level = 0              # pure push/fold: open-jam or fold
rake_rate = 0.05                # no flop no drop: fold-wins are unraked
rake_cap_bb = 3.0

[solver]
traversals = 48000000
seed = 1
export_reach = 0.0002
starter_reach = 0.0002
